<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        header {
            background: #ddd;
            padding: 20px 0;
            border-bottom: 2px solid #bbb;
        }

        .top-bar {
            text-align: right;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            background: #ccc;
            padding: 20px;
            font-weight: bold;
        }

        .nav a {
            color: blue;
            text-decoration: underline;
        }

        main {
            margin: 20px 0;
        }

        .article {
            display: flex;
            justify-content: space-between;
            background: #eee;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }

        .article-text {
            width: 65%;
        }

        .article h2 {
            margin-top: 0;
        }

        .image-placeholder {
            width: 30%;
            background: #ddd;
            border: 1px solid #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 14px;
        }

        footer {
            background: #ddd;
            padding: 20px 0;
            border-top: 2px solid #bbb;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
        }

        .footer-links a {
            display: block;
            color: blue;
            text-decoration: underline;
            margin-bottom: 5px;
        }

        .footer-left {
            max-width: 300px;
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="top-bar">http://host:port/cms</div>
        <div class="nav">
            <div class="logo">LOGO</div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Blog</a>
        </div>
    </div>
</header>

<main class="container">
    <div class="article">
        <div class="article-text">
            <h2>A title for your first article</h2>
            <p>
                TEXT
            </p>
        </div>
        <div class="image-placeholder">Image</div>
    </div>

    <div class="article">
        <div class="article-text">
            <h2>A title for your first article</h2>
            <p>
                TEXT
            </p>
        </div>
        <div class="image-placeholder">Image</div>
    </div>
</main>

<footer>
    <div class="container footer-content">
        <div class="footer-left">
            <h3>Your company's name</h3>
            <p>
                TEXT
            </p>
            <p>© 2024, Company's name, All rights reserved.</p>
        </div>

        <div class="footer-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Blog</a>
        </div>

        <div class="footer-links">
            <a href="#">Facebook</a>
            <a href="#">LinkedIn</a>
            <a href="#">GitHub</a>
        </div>
    </div>
</footer>

</body>
</html>
